# Optional overlay for in-app updates (F-46).
# Usage: docker compose -f docker-compose.yml -f docker-compose.update.yml up -d
# Requires: FINANCER_UPDATE_ENABLED=true, FINANCER_HOST_APP_DIR, FINANCER_DOCKER_GID in .env
services:
  app:
    environment:
      FINANCER_UPDATE_ENABLED: ${FINANCER_UPDATE_ENABLED:-false}
      # Host clone is mounted at /deploy — app must use container path, not FINANCER_HOST_APP_DIR from .env
      FINANCER_HOST_APP_DIR: /deploy
      FINANCER_DEPLOY_MODE: ${FINANCER_DEPLOY_MODE:-build}
      # Standalone Node has a minimal PATH — required for spawn(bash)
      PATH: /bin:/usr/bin:/sbin:/usr/local/bin:/usr/sbin
    group_add:
      - "${FINANCER_DOCKER_GID:-999}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${FINANCER_HOST_APP_DIR}:/deploy:rw
