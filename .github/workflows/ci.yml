name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
    # Nur Doku/Changelog: kein Test/Build/Docker (Tag-Pushes ignorieren paths laut GitHub immer)
    paths-ignore:
      - "**.md"
      - "plan/**"
      - "src/data/release-notes.ts"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "plan/**"
      - "src/data/release-notes.ts"
      - "LICENSE"

# Gleicher Commit (main + Tag): nur ein Lauf — der neuere bricht den anderen ab.
concurrency:
  group: ci-${{ github.sha }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npm run lint

      - run: npm run test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npm run build

      - name: Prepare Docker image context
        run: |
          mkdir -p docker-image-context/standalone docker-image-context/static
          cp -r public docker-image-context/public
          cp -r .next/standalone/. docker-image-context/standalone/
          cp -r .next/static/. docker-image-context/static/
          cp -r prisma docker-image-context/prisma
          cp prisma.config.ts docker-entrypoint.sh Dockerfile.ci package.json docker-image-context/

      - uses: actions/upload-artifact@v4
        with:
          name: next-docker-context
          path: docker-image-context/
          retention-days: 1

  docker:
    runs-on: ubuntu-latest
    needs: [quality, build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: next-docker-context
          path: docker-image-context

      - name: Read package version
        id: pkg
        run: echo "version=$(node -p "require('./docker-image-context/package.json').version")" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.pkg.outputs.version }}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v6
        with:
          context: docker-image-context
          file: docker-image-context/Dockerfile.ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
